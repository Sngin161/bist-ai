<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BIST AI Pro</title>
</head>

<body style="font-family:Arial;background:#0b1220;color:white;text-align:center;padding:20px;">

<h1>BIST Profesyonel Grafik</h1>

<input id="hisse" placeholder="Örn: THYAO">
<br><br>

<button onclick="grafikYukle()">Grafiği Göster</button>

<div id="grafik" style="margin-top:30px;"></div>

<script>

function grafikYukle(){

let h = document.getElementById("hisse").value.toUpperCase();

document.getElementById("grafik").innerHTML = 
'<iframe src="https://s.tradingview.com/widgetembed/?symbol=BIST:'+h+'&interval=D&theme=dark" width="100%" height="400"></iframe>';

}

</script>

</body>
</html>
