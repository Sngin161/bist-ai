<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BIST AI</title>
</head>
<body style="font-family:Arial;text-align:center;background:#0b1220;color:white;padding:40px;">

<h1>BIST AI Analiz</h1>

<input id="hisse" placeholder="Hisse kodu">
<br><br>

<button onclick="analiz()">Analiz Yap</button>

<p id="sonuc" style="margin-top:30px;"></p>

<script>
function analiz(){
var h = document.getElementById("hisse").value;
document.getElementById("sonuc").innerHTML =
h + " için analiz hazırlanıyor...";
}
</script>

</body>
</html>
