<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BIST AI Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
text-align:center;
}

header{
padding:20px;
background:#111a2e;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

input{
padding:12px;
width:70%;
max-width:300px;
border-radius:8px;
border:none;
margin-top:20px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
margin-left:10px;
cursor:pointer;
}

.card{
margin-top:30px;
background:#111a2e;
padding:20px;
border-radius:12px;
max-width:500px;
margin-left:auto;
margin-right:auto;
}
</style>

</head>

<body>

<header>
BIST AI ANALİZ PLATFORMU
</header>

<div class="container">

<input id="hisse" placeholder="Hisse kodu (Örn: THYAO)">
<button onclick="analiz()">Analiz</button>

<div class="card" id="sonuc">
Sonuç burada görünecek
</div>

</div>

<script>
function analiz(){
let h = document.getElementById("hisse").value;

document.getElementById("sonuc").innerHTML =
"📊 " + h + " için analiz hazırlanıyor...<br><br>" +
"⚡ Teknik analiz motoru bir sonraki aşamada eklenecek.";
}
</script>

</body>
</html>
