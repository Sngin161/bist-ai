<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BIST AI</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:100px;
}

input{
padding:10px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
background:#22c55e;
border:none;
cursor:pointer;
}

#sonuc{
margin-top:30px;
font-size:22px;
}
</style>

</head>

<body>

<h1>BIST AI ANALİZ</h1>

<input id="hisse" placeholder="THYAO">

<button onclick="analiz()">Analiz Yap</button>

<div id="sonuc"></div>

<script>

async function analiz(){

let hisse=document.getElementById("hisse").value.toUpperCase()

document.getElementById("sonuc").innerHTML="Analiz yapılıyor..."

try{

let response=await fetch("https://bist-ai-backend.onrender.com/analyze/"+hisse)

let data=await response.json()

if(data.error){
document.getElementById("sonuc").innerHTML=data.error
}else{
document.getElementById("sonuc").innerHTML="RSI: "+data.rsi
}

}catch(e){

document.getElementById("sonuc").innerHTML="Sunucu bağlantı hatası"

}

}

</script>

</body>
</html>
