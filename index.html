<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BIST AI PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
padding:30px;
}

.card{
margin-top:30px;
padding:20px;
border-radius:15px;
background:#1e293b;
display:inline-block;
min-width:300px;
}

input{
padding:10px;
font-size:18px;
width:200px;
}

button{
padding:10px 20px;
font-size:18px;
background:#22c55e;
border:none;
cursor:pointer;
margin-left:10px;
}

.big-score{
font-size:40px;
font-weight:bold;
margin-top:10px;
}

.signal{
font-size:24px;
margin-top:10px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>📊 BIST AI PROFESSIONAL</h1>

<input id="hisse" placeholder="THYAO">
<button onclick="analiz()">Analiz</button>

<div id="panel"></div>

</div>

<script>

async function analiz(){

let h = document.getElementById("hisse").value.toUpperCase();

document.getElementById("panel").innerHTML="Analiz yapılıyor...";

try{

let response = await fetch("https://bist-ai-backend.onrender.com/analyze/"+h);
let data = await response.json();

if(data.error){
document.getElementById("panel").innerHTML=data.error;
return;
}

let color = "#facc15";

if(data.signal.includes("AL")) color="#22c55e";
if(data.signal.includes("SAT")) color="#ef4444";

document.getElementById("panel").innerHTML = `
<div class="card" style="border:2px solid ${color}">
<h2>${data.symbol}</h2>

<div>RSI: ${data.rsi}</div>
<div>EMA20: ${data.ema20}</div>
<div>EMA50: ${data.ema50}</div>
<div>MACD: ${data.macd}</div>

<div class="big-score">Skor: ${data.score}</div>

<div class="signal" style="color:${color}">
${data.signal}
</div>

</div>
`;

}catch(e){
document.getElementById("panel").innerHTML="Sunucu bağlantı hatası";
}

}

</script>

</body>
</html>
