<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BIST Pro Live</title>
</head>

<body style="font-family:Arial;background:#0b1220;color:white;text-align:center;padding:20px;">

<h1>BIST Profesyonel Analiz</h1>

<input id="hisse" placeholder="Örn: THYAO">
<br><br>

<button onclick="veriCek()">Canlı Veriyi Getir</button>

<div id="sonuc" style="margin-top:30px;"></div>

<div id="grafik" style="margin-top:40px;"></div>

<script>

async function veriCek(){

let hisse = document.getElementById("hisse").value.toUpperCase();
let sembol = hisse + ".IS";

let url = "https://query1.finance.yahoo.com/v7/finance/quote?symbols=" + sembol;

try{

let response = await fetch(url);
let data = await response.json();

let result = data.quoteResponse.result[0];

let fiyat = result.regularMarketPrice;
let degisim = result.regularMarketChangePercent;
let hacim = result.regularMarketVolume;

document.getElementById("sonuc").innerHTML =
"<h2>" + hisse + "</h2>" +
"💰 Fiyat: " + fiyat + " TL<br>" +
"📊 Günlük Değişim: " + degisim.toFixed(2) + "%<br>" +
"📦 Hacim: " + hacim;

document.getElementById("grafik").innerHTML =
'<iframe src="https://s.tradingview.com/widgetembed/?symbol=BIST:'+hisse+'&interval=D&theme=dark" width="100%" height="400"></iframe>';

}
catch(error){
document.getElementById("sonuc").innerHTML =
"Veri alınamadı. Hisse kodunu kontrol et.";
}

}

</script>

</body>
</html>
