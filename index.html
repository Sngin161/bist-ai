<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BIST AI Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
padding:30px;
}

input{
padding:10px;
font-size:18px;
width:200px;
}

button{
padding:10px 20px;
font-size:18px;
background:#22c55e;
border:none;
cursor:pointer;
margin-left:10px;
}

#sonuc{
margin-top:30px;
font-size:20px;
line-height:1.6;
}
</style>

</head>

<body>

<div class="container">

<h1>📊 BIST AI ANALİZ</h1>

<input id="hisse" placeholder="THYAO">
<button onclick="analiz()">Analiz Yap</button>

<div id="sonuc"></div>

</div>

<script>

async function analiz(){

let h = document.getElementById("hisse").value.toUpperCase();

document.getElementById("sonuc").innerHTML="Analiz yapılıyor...";

try{

let response = await fetch("https://bist-ai-backend.onrender.com/analyze/"+h);
let data = await response.json();

if(data.error){
document.getElementById("sonuc").innerHTML=data.error;
return;
}

let rsi = data.rsi;

let sinyal = "BEKLE 🟡";

if(rsi < 30){
sinyal = "GÜÇLÜ AL 🟢";
}
else if(rsi > 70){
sinyal = "SAT / DİKKAT 🔴";
}

document.getElementById("sonuc").innerHTML =
"RSI: " + rsi + "<br><br>" +
"Sinyal: " + sinyal;

}catch(e){
document.getElementById("sonuc").innerHTML="Sunucu bağlantı hatası";
}

}

</script>

</body>
</html>
