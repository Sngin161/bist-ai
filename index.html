<script>

async function analiz(){

let hisse = document.getElementById("hisse").value.toUpperCase()

document.getElementById("sonuc").innerHTML="Analiz yapılıyor..."

try{

let veri = await fetch("https://bist-ai-backend.onrender.com/analyze/" + hisse)

let json = await veri.json()

if(json.error){

document.getElementById("sonuc").innerHTML="Hata: " + json.error

}else{

document.getElementById("sonuc").innerHTML="RSI: " + json.rsi

}

}catch(e){

document.getElementById("sonuc").innerHTML="Sunucu bağlantı hatası"

}

}

</script>
