<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BIST AI PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{padding:30px;}

input{
padding:10px;
font-size:18px;
width:200px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
margin-left:10px;
background:#3b82f6;
color:white;
}

.card{
margin-top:30px;
padding:25px;
border-radius:20px;
display:inline-block;
min-width:320px;
}

.big{
font-size:50px;
font-weight:bold;
margin:15px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 BIST AI ANALİZ</h1>

<input id="hisse" placeholder="THYAO">
<button onclick="analiz()">Analiz</button>

<div id="panel"></div>

</div>

<script>

async function analiz(){

let h = document.getElementById("hisse").value.toUpperCase();

document.getElementById("panel").innerHTML="Analiz yapılıyor...";

try{

let response = await fetch("https://bist-ai-backend.onrender.com/analyze/"+h);
let data = await response.json();

if(data.error){
document.getElementById("panel").innerHTML=data.error;
return;
}

let color="#facc15";

if(data.signal.includes("AL")) color="#22c55e";
if(data.signal.includes("SAT")) color="#ef4444";

document.getElementById("panel").innerHTML=`
<div class="card" style="background:${color}22;border:3px solid ${color}">
<h2>${data.symbol}</h2>

<div>RSI: ${data.rsi}</div>
<div>EMA20: ${data.ema20}</div>
<div>EMA50: ${data.ema50}</div>
<div>MACD: ${data.macd}</div>

<div class="big">${data.score}</div>

<div style="font-size:22px;font-weight:bold;">
${data.signal}
</div>

<br>

<div style="font-size:16px;opacity:0.9;">
${data.comment}
</div>

</div>
`;

}catch(e){
document.getElementById("panel").innerHTML="Sunucu bağlantı hatası";
}

}

</script>

</body>
</html>
